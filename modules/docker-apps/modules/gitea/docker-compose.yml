services:

  gitea-db:
    image: postgres:18-alpine
    container_name: gitea-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB
      - POSTGRES_USER
      - POSTGRES_PASSWORD
    networks:
      - gitea-network
    volumes:
      - gitea-db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s

  gitea:
    image: gitea/gitea:latest
    container_name: gitea
    restart: unless-stopped
    depends_on:
      gitea-db:
        condition: service_healthy
    networks:
      services-network:
        priority: 100   # Primary network - used for Traefik/outbound routing
      gitea-network:
        priority: 10    # Internal only - used to reach gitea-db
    volumes:
      - /etc/ssl/certs/ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt:ro
      - gitea-data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      # --- Database -----------------------------------------------------------
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=gitea-db:5432
      - GITEA__database__NAME=${POSTGRES_DB}
      - GITEA__database__USER=${POSTGRES_USER}
      - GITEA__database__PASSWD=${POSTGRES_PASSWORD}

      # --- Server -------------------------------------------------------------
      - GITEA__server__DOMAIN
      - GITEA__server__ROOT_URL
      - GITEA__server__HTTP_PORT
      - GITEA__server__SSH_DOMAIN
      - GITEA__server__START_SSH_SERVER
      - GITEA__server__SSH_LISTEN_PORT
      - GITEA__server__SSH_PORT
      - GITEA__oauth2__ACCESS_TOKEN_EXPIRATION_TIME

      # --- Security -----------------------------------------------------------
      - GITEA__security__INSTALL_LOCK
      - GITEA__security__SECRET_KEY
      - GITEA__security__INTERNAL_TOKEN

      # --- Service ------------------------------------------------------------
      - GITEA__service__ALLOW_ONLY_EXTERNAL_REGISTRATION

      # --- OAuth2 -------------------------------------------------------------
      - GITEA__oauth2__ENABLED

      # --- Actions ------------------------------------------------------------
      - GITEA__actions__ENABLED

      # --- Runner token pre-seed ---------------------------------------------
      # Gitea reads this on startup and registers it as the valid instance-level
      # runner registration token. The gitea-runner service uses the same value.
      - GITEA_RUNNER_REGISTRATION_TOKEN

      # --- Mailer (optional) --------------------------------------------------
      # - GITEA__mailer__ENABLED=true
      # - GITEA__mailer__SMTP_ADDR
      # - GITEA__mailer__SMTP_PORT
      # - GITEA__mailer__FROM
      # - GITEA__mailer__USER
      # - GITEA__mailer__PASSWD

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=services-network"
      - "traefik.http.routers.gitea.rule=Host(`${GITEA__server__DOMAIN}`)"
      - "traefik.http.routers.gitea.entrypoints=websecure"
      - "traefik.http.services.gitea.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Init container - runs once after Gitea is healthy, then exits.
  # Handles everything that can't be done via env vars:
  #   1. Create the local admin user (fallback if Zitadel is unavailable)
  #   2. Register Zitadel as an OIDC authentication source
  # On subsequent `docker compose up` calls both commands fail silently (|| true)
  # because the user/source already exist - safe to re-run.
  # ---------------------------------------------------------------------------
  gitea-init:
    image: gitea/gitea:latest
    container_name: gitea-init
    restart: "no"
    depends_on:
      gitea:
        condition: service_healthy
    networks:
      - gitea-network
    user: git
    volumes:
      - /etc/ssl/certs/ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt:ro
      - gitea-data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      # Tells the Gitea CLI where to find app.ini inside the mounted volume.
      # Without this the CLI can't locate config and emits confusing flag errors.
      - GITEA_CUSTOM=/data/gitea
      # DB connection so the CLI can reach the database
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=gitea-db:5432
      - GITEA__database__NAME=${POSTGRES_DB}
      - GITEA__database__USER=${POSTGRES_USER}
      - GITEA__database__PASSWD=${POSTGRES_PASSWORD}
      # Admin credentials
      - GITEA_ADMIN_USER
      - GITEA_ADMIN_PASSWORD
      - GITEA_ADMIN_EMAIL
      - GITEA__migrations__ALLOW_LOCALNETWORKS
      - GITEA__migrations__SKIP_TLS_VERIFY
      - GITEA__migrations__ALLOWED_DOMAINS
      - GITEA__repository__DEFAULT_BRANCH
      # Zitadel OIDC credentials (from tofu apply → stack_env_guide output)
      - ZITADEL_CLIENT_ID
      - ZITADEL_CLIENT_SECRET
      - ZITADEL_DISCOVERY_URL
      - ZITADEL_PROVIDER_NAME
    command:
      - /bin/sh
      - -c
      - |
        set -e
        echo '==> Creating admin user...'
        gitea admin user create \
          --username "$GITEA_ADMIN_USER" \
          --password "$GITEA_ADMIN_PASSWORD" \
          --email "$GITEA_ADMIN_EMAIL" \
          --admin --must-change-password=false || true

        echo '==> Registering Zitadel OIDC auth source...'
        gitea admin auth add-oauth \
          --name "$ZITADEL_PROVIDER_NAME" \
          --provider openidConnect \
          --key "$ZITADEL_CLIENT_ID" \
          --secret "$ZITADEL_CLIENT_SECRET" \
          --auto-discover-url "$ZITADEL_DISCOVERY_URL" \
          --scopes "openid email profile" \
          --group-claim-name "roles" \
          --admin-group "gitea_admin" || true

        echo '==> Init complete.'

  gitea-runner:
    image: gitea/act_runner:latest
    container_name: gitea-runner
    restart: unless-stopped
    depends_on:
      gitea:
        condition: service_healthy
    networks:
      services-network:
        priority: 100
    volumes:
      - /etc/ssl/certs/ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt:ro
      - gitea-runner-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - GITEA_INSTANCE_URL
      - GITEA_RUNNER_REGISTRATION_TOKEN
      - GITEA_RUNNER_NAME

networks:
  services-network:
    external: true
  gitea-network:
    external: true

volumes:
  gitea-data:
    external: true
  gitea-db-data:
    external: true
  gitea-runner-data:
    external: true
